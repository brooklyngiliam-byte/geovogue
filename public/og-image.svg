<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FAF6F1"/>

  <!-- Subtle border -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#7D2640" stroke-width="2" opacity="0.3"/>

  <!-- Miffy — large, centered left -->
  <!-- Left ear -->
  <ellipse cx="390" cy="155" rx="52" ry="88" fill="#FAF6F1" stroke="#1A1A1A" stroke-width="10"/>
  <!-- Right ear -->
  <ellipse cx="520" cy="155" rx="52" ry="88" fill="#FAF6F1" stroke="#1A1A1A" stroke-width="10"/>
  <!-- Head -->
  <circle cx="455" cy="350" r="175" fill="#FAF6F1" stroke="#1A1A1A" stroke-width="10"/>
  <!-- Eyes -->
  <circle cx="400" cy="310" r="18" fill="#1A1A1A"/>
  <circle cx="510" cy="310" r="18" fill="#1A1A1A"/>
  <!-- X mouth -->
  <line x1="430" y1="385" x2="455" y2="420" stroke="#7D2640" stroke-width="12" stroke-linecap="round"/>
  <line x1="480" y1="385" x2="455" y2="420" stroke="#7D2640" stroke-width="12" stroke-linecap="round"/>

  <!-- Title -->
  <text x="720" y="280" font-family="Georgia, serif" font-size="96" fill="#7D2640" text-anchor="middle">GeoVogue</text>

  <!-- Subtitle -->
  <text x="720" y="360" font-family="Georgia, serif" font-size="36" fill="#1A1A1A" opacity="0.5" text-anchor="middle">A daily fashion &amp; art geography game</text>
</svg>
